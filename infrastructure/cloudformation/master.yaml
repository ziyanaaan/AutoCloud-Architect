AWSTemplateFormatVersion: '2010-09-09'
Description: 'AutoCloud Architect - Master Stack'

Parameters:
  AppName:
    Type: String
    Description: Application name
  InstanceType:
    Type: String
    Default: t3.medium
  UseALB:
    Type: String
    Default: 'true'
  UseASG:
    Type: String
    Default: 'false'
  CreateDynamoDB:
    Type: String
    Default: 'true'

Resources:
  # IAM Stack
  IAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./iam.yaml
      Parameters:
        AppName: !Ref AppName

  # VPC Stack
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./vpc.yaml
      Parameters:
        AppName: !Ref AppName

  # Storage Stack
  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./storage.yaml
      Parameters:
        AppName: !Ref AppName
        CreateDynamoDB: !Ref CreateDynamoDB

  # Compute Stack
  ComputeStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - VPCStack
      - IAMStack
    Properties:
      TemplateURL: ./compute.yaml
      Parameters:
        AppName: !Ref AppName
        InstanceType: !Ref InstanceType
        VpcId: !GetAtt VPCStack.Outputs.VpcId
        SubnetId: !GetAtt VPCStack.Outputs.PublicSubnet1Id
        UseALB: !Ref UseALB
        UseASG: !Ref UseASG

Outputs:
  VpcId:
    Value: !GetAtt VPCStack.Outputs.VpcId
  
  PublicSubnet1:
    Value: !GetAtt VPCStack.Outputs.PublicSubnet1Id
  
  S3Bucket:
    Value: !GetAtt StorageStack.Outputs.S3BucketName
  
  EC2InstanceId:
    Value: !GetAtt ComputeStack.Outputs.InstanceId
  
  ApplicationURL:
    Value: !If 
      - !Equals [!Ref UseALB, 'true']
      - !Sub 'http://${ComputeStack.Outputs.ALBDNSName}'
      - !Sub 'http://${ComputeStack.Outputs.PublicIP}'
