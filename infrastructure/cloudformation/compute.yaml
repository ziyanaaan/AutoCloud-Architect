AWSTemplateFormatVersion: '2010-09-09'
Description: 'AutoCloud Architect - Compute Resources'

Parameters:
  AppName:
    Type: String
  InstanceType:
    Type: String
    Default: t3.medium
  KeyName:
    Type: String
    Default: ''
  VpcId:
    Type: String
  SubnetId:
    Type: String
  UseALB:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
  UseASG:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']

Conditions:
  CreateALB: !Equals [!Ref UseALB, 'true']
  CreateASG: !Equals [!Ref UseASG, 'true']
  HasKeyName: !Not [!Equals [!Ref KeyName, '']]

Resources:
  # Security Group
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AppName} Security Group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-sg'

  # EC2 Instance (when not using ASG)
  EC2Instance:
    Type: AWS::EC2::Instance
    Condition: !Not [Condition: CreateASG]
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref 'AWS::NoValue']
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          amazon-linux-extras install nginx1 -y
          systemctl start nginx
          systemctl enable nginx
          echo "<h1>${AppName} - Deployed by AutoCloud Architect</h1>" > /usr/share/nginx/html/index.html
      Tags:
        - Key: Name
          Value: !Sub '${AppName}-instance'

  # Instance Profile
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref InstanceRole

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  # Application Load Balancer
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: CreateALB
    Properties:
      Name: !Sub '${AppName}-alb'
      Subnets:
        - !Ref SubnetId
      SecurityGroups:
        - !Ref SecurityGroup
      Scheme: internet-facing
      Type: application

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: CreateALB
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: CreateALB
    Properties:
      Name: !Sub '${AppName}-tg'
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      HealthCheckPath: /
      TargetType: instance

Outputs:
  InstanceId:
    Condition: !Not [Condition: CreateASG]
    Value: !Ref EC2Instance
  
  PublicIP:
    Condition: !Not [Condition: CreateASG]
    Value: !GetAtt EC2Instance.PublicIp
  
  ALBDNSName:
    Condition: CreateALB
    Value: !GetAtt ALB.DNSName
  
  SecurityGroupId:
    Value: !Ref SecurityGroup
